<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Revolusi Studio</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --ios-red: #FF3B30;
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* Latar belakang dengan gradasi warna iOS agar efek glass terlihat maksimal */
            background-image: url('https://images.unsplash.com/photo-1614851099511-773084f6911d?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .admin-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header-glass {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 20px 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }

        .btn-refresh {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-refresh:hover { background: rgba(255, 255, 255, 0.3); }

        /* Gaya Tabel Liquid */
        .table-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255, 255, 255, 0.1);
            padding: 18px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            opacity: 0.8;
        }

        td {
            padding: 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 15px;
        }

        tr:last-child td { border-bottom: none; }

        /* Tombol Aksi Liquid */
        .btn-action {
            padding: 8px 16px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-right: 5px;
        }

        .btn-selesai { background: var(--ios-green); color: white; }
        .btn-batal { background: rgba(255, 255, 255, 0.2); color: white; border: 1px solid var(--glass-border); }

        .btn-action:active { transform: scale(0.95); }

        .status-badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            th:nth-child(1), td:nth-child(1) { display: none; } /* Sembunyikan tanggal di HP */
            .header-glass { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-glass">
        <div>
            <h1>Admin Revolusi</h1>
            <span id="tgl-skrg" style="font-size: 12px; opacity: 0.7;">Memuat tanggal...</span>
        </div>
        <button class="btn-refresh" onclick="ambilDataDariSheet()">🔄 Refresh</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>Nama</th>
                    <th>Studio</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="table-admin">
                <tr>
                    <td colspan="5" style="text-align:center;">Menghubungkan ke server...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const urlScript = "https://script.google.com/macros/s/AKfycbwPdoH2h6VZLGb_LBeIO8Fi1yBrmY8Efm2hWry_9myk6mCbSkQqi6WQOHaXxIxk43BAjQ/exec";
    let dataSeluruhnya = []; // Kita simpan data mentah di sini

    async function ambilDataDariSheet() {
        try {
            const response = await fetch(urlScript);
            const resJson = await response.json();
            dataSeluruhnya = resJson.transaksi || []; // Simpan ke variabel global
            
            const tableBody = document.getElementById('table-admin');
            const d = new Date();
            const tglHariIni = d.getDate() + "/" + (d.getMonth() + 1) + "/" + d.getFullYear();
            document.getElementById('tgl-skrg').innerText = "Hari ini: " + tglHariIni;

            // Filter data hari ini
            const dataHariIni = dataSeluruhnya.filter(item => String(item.tanggal || item.Tanggal).trim() === tglHariIni);
            tableBody.innerHTML = "";

            if (dataHariIni.length === 0) {
                tableBody.innerHTML = "<tr><td colspan='5' style='text-align:center; padding:30px;'>Belum ada antrean hari ini.</td></tr>";
                return;
            }

            // Tampilkan (Terbaru di atas)
            dataHariIni.reverse().forEach((item) => {
                const statusRaw = item.status || item.Status || "";
                const status = String(statusRaw).trim();
                
                // KUNCI: Cari posisi baris asli di Google Sheets
                // Index di array + 2 (karena baris 1 adalah Header di Sheets)
                const barisAsli = dataSeluruhnya.indexOf(item) + 2;
                
                let actionContent = "";
                let rowOpacity = "1";

                if (status.toLowerCase() === "menunggu" || status === "") {
                    actionContent = `
                        <button class="btn-action btn-selesai" onclick="updateStatus(${barisAsli}, 'Selesai')">Selesai</button>
                        <button class="btn-action btn-batal" onclick="updateStatus(${barisAsli}, 'Batal')">Batal</button>
                    `;
                } else {
                    rowOpacity = "0.5";
                    const color = status.toLowerCase() === "selesai" ? "#34C759" : "#FF3B30";
                    actionContent = `<span class="status-badge" style="background:${color}22; color:${color}">${status}</span>`;
                }

                tableBody.innerHTML += `
                    <tr style="opacity: ${rowOpacity}">
                        <td style="font-size: 12px; opacity: 0.6;">${item.tanggal || item.Tanggal}</td>
                        <td><strong>${item.nama || item.Nama}</strong><br><small style="opacity:0.6">${item.wa || item.WA || ''}</small></td>
                        <td><span style="font-size:13px;">${item.tema || item.Tema}</span></td>
                        <td style="font-weight: 600;">${status}</td>
                        <td>${actionContent}</td>
                    </tr>
                `;
            });
        } catch (error) {
            console.error(error);
            document.getElementById('table-admin').innerHTML = "<tr><td colspan='5' style='color:red;'>Gagal sinkronisasi data.</td></tr>";
        }
    }

    async function updateStatus(nomorBaris, statusBaru) {
        if (!confirm("Ubah status menjadi " + statusBaru + "?")) return;
        
        // Loader sederhana pada tombol agar admin tahu sedang proses
        const btn = event.target;
        const teksAsli = btn.innerText;
        btn.innerText = "...";
        btn.disabled = true;

        const payload = {
            type: "update",
            index: nomorBaris, // Mengirimkan nomor baris yang tepat
            status: statusBaru
        };

        try {
            const resp = await fetch(urlScript, { method: 'POST', body: JSON.stringify(payload) });
            const hasil = await resp.text();
            
            if (hasil.includes("Sukses")) {
                ambilDataDariSheet(); // Refresh tabel
            } else {
                alert("Gagal update di Sheets: " + hasil);
            }
        } catch (e) {
            alert("Terjadi kesalahan koneksi!");
        } finally {
            btn.innerText = teksAsli;
            btn.disabled = false;
        }
    }

    ambilDataDariSheet();
    setInterval(ambilDataDariSheet, 30000);
</script>

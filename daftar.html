<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Revolusi Studio - Liquid UI</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* Latar belakang dengan gradasi warna iOS agar efek glass terlihat maksimal */
            background-image: url('https://images.unsplash.com/photo-1614851099511-773084f6911d?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .glass-container {
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 35px 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 { font-size: 26px; font-weight: 700; margin-bottom: 5px; letter-spacing: -1px; }
        p.subtitle { font-size: 14px; opacity: 0.8; margin-bottom: 25px; }

        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; margin-left: 8px; }

        input, select {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.25);
            border-color: var(--ios-blue);
        }

        option { background-color: #1e3c72; color: white; }

        .price-tag {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 20px;
            margin: 20px 0;
            border: 1px dashed var(--glass-border);
        }

        .total-amount { font-size: 24px; font-weight: 800; color: #fff; }

        button {
            width: 100%;
            padding: 18px;
            background: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3);
        }

        button:active { transform: scale(0.97); }

        #qris-section {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 20px;
            animation: fadeIn 0.5s;
        }

        #qris-section img { width: 100%; border-radius: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="glass-container" id="main-content">
    <div id="form-pendaftaran">
        <h1>Revolusi Studio</h1>
        <p class="subtitle">Booking Sesi Foto Premium Anda</p>

        <div class="form-group">
            <label>Nama Anda</label>
            <input type="text" id="nama" placeholder="Nama sesuai identitas">
        </div>

        <div class="form-group">
            <label>WhatsApp</label>
            <input type="number" id="wa" placeholder="081234567xxx">
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 2;">
                <label>Tema Studio</label>
                <select id="tema" onchange="hitungHarga()">
                    <option value="Classic Retro">Classic Retro (S1)</option>
                    <option value="Blue Room">Blue Room (S2)</option>
                </select>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Orang</label>
                <input type="number" id="jumlah" value="1" min="1" oninput="hitungHarga()">
            </div>
        </div>

        <div class="form-group">
            <label>Metode Pembayaran</label>
            <select id="pembayaran">
                <option value="Cash">Tunai / Cash</option>
                <option value="QRIS">QRIS / Transfer</option>
            </select>
        </div>

        <div class="price-tag">
            <div style="font-size: 12px; opacity: 0.7;">Total Bayar:</div>
            <div class="total-amount" id="display-total">Rp 15.000</div>
        </div>

        <button onclick="ambilAntrean()" id="btnSubmit">AMBIL ANTREAN</button>
    </div>

    <div id="ticket-result" style="display: none;">
        <h2 style="color: var(--ios-green);">Pendaftaran Sukses!</h2>
        <div style="font-size: 60px; font-weight: 800; margin: 20px 0;" id="nomor-tampil">001</div>
        <p id="info-pelanggan"></p>
        
        <div id="qris-section">
            <p style="color: #333; font-size: 12px; font-weight: bold;">SCAN UNTUK MEMBAYAR</p>
            <img src="https://i.ibb.co.com/nqxYdXGG/Qris-Statis-Revolusi-Studio.png" alt="QRIS">
            <p style="color: #666; font-size: 11px; margin-top: 5px;">*Tunjukkan bukti bayar ke staf</p>
        </div>
        
        <button onclick="location.reload()" style="background: rgba(255,255,255,0.2); margin-top: 20px;">Daftar Lagi</button>
    </div>
</div>

<script>
    const urlScript = "https://script.google.com/macros/s/AKfycbwPdoH2h6VZLGb_LBeIO8Fi1yBrmY8Efm2hWry_9myk6mCbSkQqi6WQOHaXxIxk43BAjQ/exec";

    function hitungHarga() {
        const tema = document.getElementById('tema').value;
        const jml = parseInt(document.getElementById('jumlah').value) || 1;
        const harga = (tema === "Classic Retro") ? 15000 : 10000;
        const total = harga * jml;
        document.getElementById('display-total').innerText = "Rp " + total.toLocaleString('id-ID');
        return total;
    }

    async function ambilAntrean() {
        const btn = document.getElementById('btnSubmit');
        const nama = document.getElementById('nama').value;
        const wa = document.getElementById('wa').value;
        const tema = document.getElementById('tema').value;
        const jml = document.getElementById('jumlah').value;
        const metode = document.getElementById('pembayaran').value;
        const total = hitungHarga();

        if (!nama || !wa) { alert("Isi nama dan WA dulu ya!"); return; }

        btn.innerText = "Memproses...";
        btn.disabled = true;

        try {
            const res = await fetch(urlScript);
            const resJson = await res.json();
            const dataT = resJson.transaksi || [];
            const tgl = new Date().toLocaleDateString('id-ID');
            
            const antreanHariIni = dataT.filter(item => item.tema === tema && item.tanggal === tgl).length;
            const nomorUrut = (antreanHariIni + 1).toString().padStart(3, '0');

            const payload = {
                type: "transaksi",
                tanggal: tgl,
                nama: nama,
                wa: wa,
                status: "Menunggu",
                tema: tema,
                jumlah: jml,
                pembayaran: metode,
                total: total
            };

            await fetch(urlScript, { method: 'POST', body: JSON.stringify(payload) });

            // Tampilkan Tiket
            document.getElementById('form-pendaftaran').style.display = "none";
            document.getElementById('ticket-result').style.display = "block";
            document.getElementById('nomor-tampil').innerText = nomorUrut;
            document.getElementById('info-pelanggan').innerText = nama + " (" + tema + ")";

            if (metode === "QRIS") {
                document.getElementById('qris-section').style.display = "block";
            }

        } catch (e) {
            alert("Koneksi bermasalah. Coba lagi!");
            btn.innerText = "AMBIL ANTREAN";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>

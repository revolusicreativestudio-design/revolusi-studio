<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaris Aset - Revolusi Studio</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --ios-blue: #007AFF;
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-image: url('https://images.unsplash.com/photo-1614851099511-773084f6911d?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
        }

        .container { max-width: 800px; margin: 0 auto; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 26px; font-weight: 800; letter-spacing: -1px; }

        .total-aset-box {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            border: 1px dashed var(--glass-border);
            margin-bottom: 20px;
        }
        .total-aset-box h3 { margin: 0; font-size: 14px; opacity: 0.8; font-weight: 500; }
        .total-aset-box p { margin: 5px 0 0; font-size: 32px; font-weight: 800; color: #85e09b; }

        .form-row { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; }
        .form-group { flex: 1; min-width: 200px; text-align: left; }
        
        label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; margin-left: 5px; opacity: 0.9; }

        input, select {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus, select:focus { outline: none; background: rgba(255, 255, 255, 0.3); border-color: var(--ios-blue); }
        option { background-color: #1e3c72; color: white; }

        button {
            width: 100%;
            padding: 16px;
            background: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3);
        }
        button:active { transform: scale(0.96); }

        .btn-back { background: rgba(255, 255, 255, 0.1); box-shadow: none; border: 1px solid var(--glass-border); margin-bottom: 20px; }

        /* Tabel Data */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: rgba(255, 255, 255, 0.1); padding: 15px; font-size: 13px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div class="container">
    <button onclick="window.location.href='index.html'" class="btn-back">⬅ Kembali ke Portal</button>

    <div class="glass-card">
        <div class="header">
            <h1>Inventaris Aset</h1>
            <p style="margin-top: 5px; opacity: 0.8; font-size: 14px;">Catat nilai perangkat dan properti studio.</p>
        </div>

        <div class="total-aset-box">
            <h3>TOTAL VALUASI ASET</h3>
            <p id="display-total">Rp 0</p>
        </div>

        <div class="form-row">
            <div class="form-group" style="flex: 2;">
                <label>Nama Aset (Merek/Tipe)</label>
                <input type="text" id="nama-aset" placeholder="Contoh: Kamera Canon EOS M50" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Kategori</label>
                <select id="kategori">
                    <option value="Elektronik">Elektronik & IT</option>
                    <option value="Properti">Properti & Dekorasi</option>
                    <option value="Software">Software & Lisensi</option>
                    <option value="Lainnya">Lainnya</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Nilai/Harga Aset (Rupiah)</label>
            <input type="number" id="nilai-aset" placeholder="Contoh: 8500000" required>
        </div>

        <button onclick="simpanAset()" id="btnSubmit">Simpan Data Aset</button>
    </div>

    <div class="glass-card">
        <h3 style="margin-top: 0; font-size: 16px; opacity: 0.9;">Daftar Aset Terdaftar</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Tgl Input</th>
                        <th>Nama Aset</th>
                        <th>Kategori</th>
                        <th>Nilai (Rp)</th>
                    </tr>
                </thead>
                <tbody id="table-aset">
                    <tr><td colspan="4" style="text-align:center;">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // GANTI URL INI DENGAN URL DEPLOYMENT BARU ANDA
    const urlScript = "https://script.google.com/macros/s/AKfycbwNEt_u9QEpFaSEIlZonhkmrQngcY75_D0mIlBdGvZBYkrHMZxcxqrclb5qOX42na9PaQ/exec";

    async function muatDataAset() {
        try {
            const res = await fetch(urlScript);
            const resJson = await res.json();
            const dataAset = resJson.aset || [];
            
            let totalValuasi = 0;
            const tableBody = document.getElementById('table-aset');
            tableBody.innerHTML = "";

            if (dataAset.length === 0) {
                tableBody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>Belum ada aset tercatat.</td></tr>";
                return;
            }

            // Tampilkan dari yang terbaru dimasukkan
            dataAset.reverse().forEach(item => {
                const nilai = parseInt(item.nilai) || 0;
                totalValuasi += nilai;

                tableBody.innerHTML += `
                    <tr>
                        <td style="font-size:12px; opacity:0.7;">${item.tanggal || '-'}</td>
                        <td><strong>${item.nama_aset || item.nama}</strong></td>
                        <td><span class="badge">${item.kategori}</span></td>
                        <td style="font-weight: 600;">Rp ${nilai.toLocaleString('id-ID')}</td>
                    </tr>
                `;
            });

            document.getElementById('display-total').innerText = "Rp " + totalValuasi.toLocaleString('id-ID');

        } catch (e) {
            console.error(e);
            document.getElementById('table-aset').innerHTML = "<tr><td colspan='4' style='color:#ff8a80;'>Gagal memuat data aset.</td></tr>";
        }
    }

    async function simpanAset() {
        const btn = document.getElementById('btnSubmit');
        const nama = document.getElementById('nama-aset').value;
        const kategori = document.getElementById('kategori').value;
        const nilai = document.getElementById('nilai-aset').value;

        if (!nama || !nilai) { alert("Nama dan Nilai aset wajib diisi!"); return; }

        btn.innerText = "Menyimpan...";
        btn.disabled = true;

        const d = new Date();
        const tgl = d.getDate() + "/" + (d.getMonth() + 1) + "/" + d.getFullYear();

        const payload = {
            type: "aset",
            tanggal: tgl,
            nama_aset: nama,
            kategori: kategori,
            nilai: nilai
        };

        try {
            await fetch(urlScript, { method: 'POST', body: JSON.stringify(payload) });
            
            // Bersihkan form
            document.getElementById('nama-aset').value = "";
            document.getElementById('nilai-aset').value = "";
            
            // Refresh tabel
            muatDataAset();
        } catch (e) {
            alert("Gagal koneksi. Coba lagi!");
        } finally {
            btn.innerText = "Simpan Data Aset";
            btn.disabled = false;
        }
    }

    // Load data awal
    muatDataAset();
</script>

</body>
</html>

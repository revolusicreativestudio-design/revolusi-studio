<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Antrean - Revolusi Studio</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --ios-blue: #007AFF;
            --ios-red: #FF3B30;
            --text-white: #ffffff;
        }

        body {
    margin: 0;
    /* Tambahkan padding di sini untuk memberi jarak dari tepi layar */
    padding: 40px; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-image: url('https://images.unsplash.com/photo-1614851099511-773084f6911d?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: var(--text-white);
    height: 100vh;
    display: flex;
    /* Perbesar gap (jarak antar kotak) menjadi 40px */
    gap: 40px; 
    box-sizing: border-box;
    overflow: hidden;
}

.studio-card {
    flex: 1;
    background: var(--glass);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid var(--glass-border);
    border-radius: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
    box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    position: relative;
    transition: all 0.5s ease;
    /* Tambahkan margin bawah opsional jika monitornya vertikal */
    margin-bottom: 10px; 
}

        /* Variasi warna border halus untuk identitas studio */
        .vintage { border-top: 8px solid var(--ios-red); }
        .blue-room { border-top: 8px solid var(--ios-blue); }

        .studio-label {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .theme-name {
            font-size: 1rem;
            opacity: 0.6;
            margin-bottom: 30px;
        }

        .status-now {
            font-size: 1.2rem;
            font-weight: 500;
            background: rgba(255,255,255,0.15);
            padding: 8px 20px;
            border-radius: 50px;
            margin-bottom: 10px;
        }

        .queue-number {
            font-size: 10rem;
            font-weight: 800;
            line-height: 1;
            margin: 10px 0;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
            font-variant-numeric: tabular-nums;
        }

        .customer-name {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: uppercase;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ppl-count {
            font-size: 1.4rem;
            opacity: 0.7;
            margin-bottom: 40px;
        }

        .footer-info {
            width: 100%;
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 25px;
            font-size: 1.2rem;
            border: 1px solid var(--glass-border);
        }

        .waiting-count {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--ios-blue);
        }

        /* Animasi berdenyut pelan agar monitor terlihat "hidup" */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.02); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        .active-pulse { animation: pulse 3s infinite ease-in-out; }
    </style>
</head>
<body>

    <div class="studio-card vintage" id="card-1">
        <div class="studio-label">STUDIO 1</div>
        <div class="theme-name">CLASSIC RETRO</div>
        <div class="status-now">SEKARANG</div>
        <div id="num-1" class="queue-number">---</div>
        <div id="name-1" class="customer-name">KOSONG</div>
        <div id="ppl-1" class="ppl-count">Ready to Shoot</div>
        <div class="footer-info">
            Sisa Antrean: <span id="count-1" class="waiting-count">0</span>
        </div>
    </div>

    <div class="studio-card blue-room" id="card-2">
        <div class="studio-label">STUDIO 2</div>
        <div class="theme-name">BLUE ROOM</div>
        <div class="status-now">SEKARANG</div>
        <div id="num-2" class="queue-number">---</div>
        <div id="name-2" class="customer-name">KOSONG</div>
        <div id="ppl-2" class="ppl-count">Ready to Shoot</div>
        <div class="footer-info">
            Sisa Antrean: <span id="count-2" class="waiting-count">0</span>
        </div>
    </div>

<script>
    const urlScript = "https://script.google.com/macros/s/AKfycbxAqG0ElSvVC0a2w4htnU3RGZzVYub-xbmR_It9b11wU5udxCWErKKJ2OMonBdOilMPdw/exec";

    async function muatAntrean() {
        try {
            const res = await fetch(urlScript);
            const resJson = await res.json();
            const data = resJson.transaksi || [];
            
            const d = new Date();
            const tglHariIni = d.getDate() + "/" + (d.getMonth() + 1) + "/" + d.getFullYear();

            // LOGIKA FILTER STUDIO 1
            const semuaS1 = data.filter(item => item.tema === "Classic Retro" && item.tanggal === tglHariIni);
            const antreanS1 = semuaS1.filter(item => item.status === "Menunggu");
            const selesaiS1 = semuaS1.length - antreanS1.length;

            // LOGIKA FILTER STUDIO 2
            const semuaS2 = data.filter(item => item.tema === "Blue Room" && item.tanggal === tglHariIni);
            const antreanS2 = semuaS2.filter(item => item.status === "Menunggu");
            const selesaiS2 = semuaS2.length - antreanS2.length;

            // --- UPDATE TAMPILAN S1 ---
            if (antreanS1.length > 0) {
                const skr = antreanS1[0];
                document.getElementById('num-1').innerText = (selesaiS1 + 1).toString().padStart(3, '0');
                document.getElementById('name-1').innerText = skr.nama;
                document.getElementById('ppl-1').innerText = skr.jumlah + " ORANG";
                document.getElementById('count-1').innerText = antreanS1.length - 1;
                document.getElementById('card-1').classList.add('active-pulse');
            } else {
                document.getElementById('num-1').innerText = "---";
                document.getElementById('name-1').innerText = "KOSONG";
                document.getElementById('ppl-1').innerText = "Ready to Shoot";
                document.getElementById('count-1').innerText = "0";
                document.getElementById('card-1').classList.remove('active-pulse');
            }

            // --- UPDATE TAMPILAN S2 ---
            if (antreanS2.length > 0) {
                const skr = antreanS2[0];
                document.getElementById('num-2').innerText = (selesaiS2 + 1).toString().padStart(3, '0');
                document.getElementById('name-2').innerText = skr.nama;
                document.getElementById('ppl-2').innerText = skr.jumlah + " ORANG";
                document.getElementById('count-2').innerText = antreanS2.length - 1;
                document.getElementById('card-2').classList.add('active-pulse');
            } else {
                document.getElementById('num-2').innerText = "---";
                document.getElementById('name-2').innerText = "KOSONG";
                document.getElementById('ppl-2').innerText = "Ready to Shoot";
                document.getElementById('count-2').innerText = "0";
                document.getElementById('card-2').classList.remove('active-pulse');
            }

        } catch (e) { console.error("Monitor Error:", e); }
    }

    // Refresh tiap 10 detik agar sinkron dengan Admin
    setInterval(muatAntrean, 10000);
    muatAntrean();
</script>

</body>
</html>
